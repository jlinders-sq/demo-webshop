<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Basket - Fruit Shop</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header role="banner">
      <div class="header-center">
        <a href="index.html" class="logo" aria-label="Go to homepage">
          <img
            src="img/fruit-shop-logo.png"
            class="logo-img"
            alt="Fruit Shop Logo"
          />
          <span class="products-text"> View Products </span>
        </a>
        <nav role="navigation" aria-label="Main navigation">
          <a
            href="basket.html"
            class="basket-link"
            aria-label="View shopping basket"
          >
            <img
              src="img/basket-icon.png"
              class="basket-img"
              alt="Shopping basket icon"
            />
            <span class="basket-text">View shopping basket</span>
          </a>
        </nav>
      </div>
    </header>
    <main id="main-content" role="main">
      <div class="content-box">
        <h1>Your Shopping Basket</h1>
        <ul
          class="order-list"
          id="basketList"
          aria-label="Shopping basket items"
        ></ul>
        <div class="cart-buttons-row" role="group" aria-label="Basket actions">
          <button id="clearBasket" aria-label="Clear all items from basket">
            Clear Basket
          </button>
          <button
            id="requestProductBtn"
            type="button"
            aria-label="Request a custom product"
          >
            Request Product
          </button>
          <a
            href="checkout.html"
            id="checkoutLink"
            aria-label="Proceed to checkout"
          >
            <button id="checkoutBtn">Checkout</button>
          </a>
        </div>
      </div>
      <div id="requestModal" class="request-modal" role="dialog" aria-modal="true" aria-labelledby="requestModalTitle">
        <div class="request-modal-content">
          <button id="closeRequestModal" class="request-modal-close" type="button" aria-label="Close request product dialog">×</button>
          <h2 id="requestModalTitle">Request a product</h2>
          <form id="requestForm">
            <input id="requestEditingIndex" type="hidden" value="" />
            <div class="form-group">
              <label for="requestProductName">Product name</label>
              <input id="requestProductName" name="requestProductName" type="text" required />
            </div>
            <div class="form-group">
              <label for="requestDescription">Description</label>
              <textarea id="requestDescription" name="requestDescription" rows="4"></textarea>
            </div>
            <div class="form-group">
              <label for="requestReference">Reference link</label>
              <input id="requestReference" name="requestReference" type="url" />
            </div>
            <div class="request-modal-actions">
              <button id="cancelRequestModal" type="button">Cancel</button>
              <button type="submit">Save request</button>
            </div>
          </form>
        </div>
      </div>
    </main>
    <footer>
      <a
        href="https://www.linkedin.com/in/timlolkema/"
        target="_blank"
        rel="noopener noreferrer"
      >
        By Tim Lolkema
      </a>
    </footer>
    <script src="shop.js"></script>
    <script>
      renderBasket();
      document.getElementById("clearBasket").onclick = function () {
        clearBasket();
        renderBasket();
        renderBasketIndicator();
      };
    </script>
  </body>
</html>
